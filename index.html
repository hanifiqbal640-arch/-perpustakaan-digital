<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpustakaan Digital</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
}

header{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    margin:0;
}

.btn{
    display:block;
    text-align:center;
    padding:12px;
    text-decoration:none;
    background:#2563eb;
    color:white;
}
</style>
</head>

<body>

<header>
<h1>📚 E-BOOK YANG PERLU ANDA BACA</h1>
<p>Koleksi e-book untuk pembelajaran dan rujukan</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<img src=" Blue and White Playful AI Digital Creator eBook Cover - 1.png" alt="Cover E-Book" style="max-width:300px; width:100%; height:auto;">
<h3>RAHSIA MENGHASILKAN WANG dari PRODUK DIGITAL</h3>
<a href="https://online.fliphtml5.com/ajadz/athj/#p=1" class="btn">Baca Sekarang</a
</div>

<div class="card">
<img src="Red Minimal Money Guide E-Book Cover - 1.png" alt="Personal Branding Dari Zero To Hero">">
<h3>PERSONAL BRANDING DARI ZERO TO HERO</h3>
<a href="#" class="btn">Baca Sekarang</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x400?text=E-Book+Bisnes">
<h3>E-Book Bisnes</h3>
<a href="#" class="btn">Baca Sekarang</a>
</div>

</div>

</div>

</body>
</html>
